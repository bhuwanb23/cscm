# Reference documentation for API Gateway routing rules.
# The gateway (gateway.js) currently hardcodes these values rather than
# reading this YAML file. Keep this in sync with the actual proxy setup.
#
# Current gateway topology:
#   /api/v1/{demand,demand-planning,routing,...}  → http://localhost:8000 (Python AI/ML)
#   /api/v1/{auth,events,inventory,orders,...}     → http://localhost:3000 (Node.js CRUD)

services:
  - name: ai-ml-api
    url: http://localhost:8000

  - name: express-api
    url: http://localhost:3000

routes:
  - path: /api/v1/*
    service: express-api
    strip_prefix: /api/v1

security:
  rate_limiting:
    enabled: true
    requests_per_minute: 1000
  authentication:
    enabled: true
    jwt_secret: ${JWT_SECRET}
  cors:
    enabled: true
    origins:
      - "*"

logging:
  level: info
  format: json

health_checks:
  interval: 30s
  timeout: 5s
